services:
  - type: web
    name: autoops-ai
    env: node
    region: ohio
    plan: free
    buildCommand: "npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend"
    startCommand: "npm start --prefix backend"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
